name: Refresh SeaVigil data (precompute)

# Precompute-and-ship-static: regenerate the incident dossiers + web data on a
# schedule and commit them, so GitHub Pages serves fresh static files with no
# server and no token in the browser.
#
# TODAY this regenerates from GFW's static training labels + the bundled SAR
# sample, so output is stable. To make the refresh MEANINGFUL, add a live-fetch
# step that pulls current GFW apparent-fishing-effort + Sentinel-1 SAR detections
# using the official gfw-api-python-client with a token from Actions secrets:
#
#   env:
#     GFW_TOKEN: ${{ secrets.GFW_TOKEN }}
#   run: uv run python -m seavigil.fetch_gfw   # (roadmap: live ingestion)
#
# That live step is the "GFW live-API ingestion" roadmap item; until it lands this
# job is scaffolding that proves the pipeline + commit path work in CI.

on:
  schedule:
    - cron: "0 3 1 * *"   # 03:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Regenerate incidents + web data
        run: |
          uv run python -m seavigil.alert --scope all --sample-sar
          uv run python -m seavigil.site
      - name: Commit refreshed data if changed
        run: |
          NAME="seavigil-bot"
          HOST="users.noreply.github.com"
          git config user.name "$NAME"
          git config user.email "${NAME}@${HOST}"
          git add results/incidents web/data
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: scheduled data refresh"
            git push
          fi
