name: Near-real-time monitor (GFW events + AIS spoofing)

# Two near-real-time sources, republished to the ?live view and the alerts feed each hour:
#  1. GFW Events API: recent gaps (going dark) + encounters (transshipment), kept when a
#     foreign or unauthorized vessel is inside another state's EEZ, or a no-take incursion.
#  2. AIS spoofing: the rolling 24h AIS buffer (filled near-continuously by ais-stream.yml and
#     persisted via the Actions cache, not committed) is read here so the detector can flag
#     impossible-speed jumps or two vessels sharing one MMSI.
# GFW_TOKEN (events + authorization) is required. AISSTREAM_KEY enables the spoofing stream;
# without it, the run does GFW events only (logged, not silent). The job commits when the
# data changes, which keeps the scheduled workflow from being auto-disabled.

on:
  schedule:
    - cron: "17 * * * *"   # hourly (offset :17); each run adds AIS to the rolling buffer
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-monitor
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Restore rolling AIS buffer (read-only; ais-stream.yml is the writer)
        uses: actions/cache/restore@v4
        with:
          path: data/positions/ais_buffer.csv
          key: ais-buffer-none
          restore-keys: ais-buffer-
      - name: Pull GFW events, detect spoofing, rebuild live view + alerts
        env:
          GFW_TOKEN: ${{ secrets.GFW_TOKEN }}
          AIS_BUFFER: data/positions/ais_buffer.csv
        run: |
          if [ -z "$GFW_TOKEN" ]; then
            echo "No GFW_TOKEN secret; the near-real-time monitor needs it for events + authorization."; exit 1
          fi
          uv run python scripts/live_monitor.py
      - name: Commit refreshed data if changed
        run: |
          git config user.name "Isma Abdelkader Di Carlo"
          EU="iadicarlo"; ED="icloud.com"   # composed so cron commits attribute to the owner
          git config user.email "${EU}@${ED}"
          git add results/live web/data/live web/data/alerts.json web/alerts.xml
          if git diff --staged --quiet; then
            echo "No data changes."; exit 0
          fi
          git commit -m "chore: near-real-time monitor refresh"
          # Push is race-prone (a queued run may have advanced main); rebase + retry.
          for attempt in 1 2 3; do
            if git push; then echo "pushed"; exit 0; fi
            echo "push rejected; syncing and retrying ($attempt)"
            git pull --rebase --autostash -X ours origin main || git rebase --abort
          done
          echo "push failed after retries"; exit 1
