name: Near-real-time monitor (GFW events)

# Pulls recent Global Fishing Watch events (gaps = going dark, encounters = transshipment),
# keeps the high-signal ones (a foreign or unauthorized vessel inside another state's EEZ, or
# a no-take reserve incursion), grades + evidences them, and republishes the ?live view and
# the alerts feed (alerts.json + alerts.xml). Runs on GitHub's servers so it works whether or
# not your computer is on. Needs the GFW_TOKEN repo secret (events + authorization both use it).
# GitHub cron is best-effort; the job commits when data changes, which keeps the scheduled
# workflow from being auto-disabled after 60 days of no commits.

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (GFW events lag ~3-4 days, so daily-ish is plenty)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-monitor
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Pull recent GFW events, grade, rebuild live view + alerts
        env:
          GFW_TOKEN: ${{ secrets.GFW_TOKEN }}
        run: |
          if [ -z "$GFW_TOKEN" ]; then
            echo "No GFW_TOKEN secret; the near-real-time monitor needs it for events + authorization."; exit 1
          fi
          uv run python scripts/live_monitor.py
      - name: Commit refreshed data if changed
        run: |
          git config user.name "Isma Abdelkader Di Carlo"
          EU="iadicarlo"; ED="icloud.com"   # composed so cron commits attribute to the owner
          git config user.email "${EU}@${ED}"
          git add results/live web/data/live web/data/alerts.json web/alerts.xml
          if git diff --staged --quiet; then
            echo "No data changes."; exit 0
          fi
          git commit -m "chore: near-real-time monitor refresh"
          # Push is race-prone (a queued run may have advanced main); rebase + retry,
          # preferring the latest run on conflict.
          for attempt in 1 2 3; do
            if git push; then echo "pushed"; exit 0; fi
            echo "push rejected; syncing and retrying ($attempt)"
            git pull --rebase --autostash -X ours origin main || git rebase --abort
          done
          echo "push failed after retries"; exit 1
